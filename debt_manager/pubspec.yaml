name: debt_manager
description: Retail Shop Debt Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.3.3
  intl: ^0.19.0
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.2.2
  http: ^1.2.1                   
  shared_preferences: ^2.2.3 
  fl_chart: ^0.68.0
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon.png"